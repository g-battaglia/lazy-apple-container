# goreleaser v2 config for lazyapple
# See https://goreleaser.com for documentation
version: 2

env:
  - CGO_ENABLED=0
  - GOFLAGS=-mod=vendor

builds:
  - id: binary
    binary: lazyapple
    goos:
      - darwin
    goarch:
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}} -X main.buildSource=binaryRelease

archives:
  - builds:
      - binary
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_Darwin_{{ .Arch }}

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^bump"

brews:
  - repository:
      owner: g-battaglia
      name: homebrew-lazyapple

    homepage: "https://github.com/g-battaglia/lazy-apple-container/"

    description: "A simple terminal UI for Apple Container, written in Go"
